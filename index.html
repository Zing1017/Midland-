<div id="hk-plate-widget" class="hk-plate-container">
  <div class="hk-plate-header">
    <h3>🚗 香港車牌拍賣結果搜尋</h3>
  </div>

  <div class="hk-plate-search-box">
    <input type="text" id="hk-plate-input" placeholder="輸入車牌號碼 (例: HK 1)" onkeypress="if(event.key === 'Enter') searchHkPlate()">
    <button onclick="searchHkPlate()">搜尋</button>
  </div>

  <div class="hk-plate-actions">
    <button class="top-btn" onclick="loadHkTopPlates()">🏆 顯示最高成交價 Top 10</button>
  </div>

  <div id="hk-plate-results" class="hk-plate-results">
    <p class="status-msg">請輸入車牌號碼進行搜尋，或點擊查看 Top 10。</p>
  </div>
</div>

<style>
  .hk-plate-container { max-width: 100%; width: 400px; margin: 20px auto; padding: 20px; border: 1px solid #e1e4e8; border-radius: 10px; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
  .hk-plate-header h3 { margin: 0 0 15px 0; color: #333333; text-align: center; font-size: 1.2rem; }
  .hk-plate-search-box { display: flex; gap: 8px; margin-bottom: 12px; }
  .hk-plate-search-box input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; text-transform: uppercase; }
  .hk-plate-search-box button { padding: 10px 16px; background-color: #0366d6; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; transition: background 0.2s; }
  .hk-plate-search-box button:hover { background-color: #005cc5; }
  .hk-plate-actions { text-align: center; margin-bottom: 15px; }
  .hk-plate-actions .top-btn { padding: 6px 12px; background-color: #2ea44f; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .hk-plate-actions .top-btn:hover { background-color: #2c974b; }
  .hk-plate-results { max-height: 300px; overflow-y: auto; border-top: 1px solid #eee; padding-top: 15px; }
  .hk-plate-results table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .hk-plate-results th, .hk-plate-results td { padding: 8px; text-align: left; border-bottom: 1px solid #eee; }
  .hk-plate-results th { background-color: #f6f8fa; color: #586069; font-weight: 600; }
  .hk-plate-results .price { color: #cb2431; font-weight: bold; text-align: right; }
  .hk-plate-results .date { color: #6a737d; font-size: 12px; }
  .status-msg { text-align: center; color: #666; font-size: 14px; word-break: break-all; }
</style>

<script>
  const API_BASE = 'https://plate.hk.app'; 
  const useProxy = true; 

  let cachedAuctions = null;

  async function fetchData(endpoint) {
    const rawUrl = `${API_BASE}${endpoint}`;
    
    if (!useProxy) {
      const res = await fetch(rawUrl);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return await res.json();
    } else {
      const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rawUrl)}`;
      const res = await fetch(proxyUrl);
      if (!res.ok) throw new Error('Proxy 連線失敗 HTTP ' + res.status);
      const json = await res.json();
      return JSON.parse(json.contents);
    }
  }

  async function searchHkPlate() {
    const inputField = document.getElementById('hk-plate-input');
    const input = inputField.value.trim().toUpperCase().replace(/\s+/g, ''); 
    const resultsDiv = document.getElementById('hk-plate-results');

    if (!input) {
      resultsDiv.innerHTML = '<p class="status-msg" style="color:#cb2431;">請先輸入車牌號碼</p>';
      return;
    }

    resultsDiv.innerHTML = '<p class="status-msg">🔍 下載總表中，請稍候...</p>';

    try {
      if (!cachedAuctions) {
        cachedAuctions = await fetchData('/api/v1/pvrm/auctions.json');
      }
      
      const results = cachedAuctions.filter(item => {
        const plate = item.single_line || '';
        return plate.toString().toUpperCase().replace(/\s+/g, '') === input;
      });

      renderHkTable(results, '找不到該車牌的拍賣紀錄。');
    } catch (err) {
      console.error('Search Error:', err);
      resultsDiv.innerHTML = `<p class="status-msg" style="color:#cb2431;">❌ 連線失敗<br><br><span style="font-size:12px;color:#666;">原因：${err.message}</span></p>`;
    }
  }

  async function loadHkTopPlates() {
    const resultsDiv = document.getElementById('hk-plate-results');
    resultsDiv.innerHTML = '<p class="status-msg">🏆 載入最高成交排行榜...</p>';

    try {
      const data = await fetchData('/api/v1/pvrm/preset.amount_desc.top1000.json');
      const top10 = Array.isArray(data) ? data.slice(0, 10) : [];
      renderHkTable(top10, '目前沒有排行榜資料。');
    } catch (err) {
      console.error('Top10 Error:', err);
      resultsDiv.innerHTML = `<p class="status-msg" style="color:#cb2431;">❌ 連線失敗<br><br><span style="font-size:12px;color:#666;">原因：${err.message}</span></p>`;
    }
  }

  function renderHkTable(dataArray, emptyMsg) {
    const resultsDiv = document.getElementById('hk-plate-results');
    if (!dataArray || dataArray.length === 0) {
      resultsDiv.innerHTML = `<p class="status-msg">${emptyMsg}</p>`;
      return;
    }

    let html = `<table><thead><tr><th>車牌</th><th style="text-align: right;">成交價</th><th>日期</th></tr></thead><tbody>`;

    dataArray.forEach(item => {
      const mark = item.single_line || '未知';
      const amount = item.amount_hkd ? `$${parseInt(item.amount_hkd).toLocaleString()}` : '未成交/撤回';
      const date = item.auction_date || '未知';

      html += `<tr><td style="font-weight: bold; font-family: monospace; font-size: 16px;">${mark}</td><td class="price">${amount}</td><td class="date">${date}</td></tr>`;
    });

    html += `</tbody></table>`;
    resultsDiv.innerHTML = html;
  }
</script>
